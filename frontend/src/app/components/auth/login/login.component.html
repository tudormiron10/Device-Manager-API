<div class="min-h-[90vh] flex items-center justify-center p-4">
  <div class="max-w-xl w-full bg-white shadow-[0_15px_50px_-15px_rgba(23,42,58,0.5)] rounded-xl overflow-hidden border-[4px] border-primary relative">
    
    <!-- Header -->
    <div class="px-4 sm:px-8 py-8 border-b-[4px] border-secondary bg-gray-50/80 text-center relative">
      <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
        <mat-icon style="width: 80px; height: 80px; font-size: 80px;">security</mat-icon>
      </div>
      
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-lg bg-primary text-white mb-4 shadow-lg">
        <mat-icon class="!w-10 !h-10 !text-4xl">lock</mat-icon>
      </div>
      <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-[0.2em] text-primary m-0">Security Access</h2>
      <p class="mt-2 text-[10px] font-black uppercase tracking-[0.3em] text-secondary">Authentication Protocol</p>
    </div>

    <div class="p-8 lg:p-10 bg-white">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-8">
        
        <!-- Credentials Section (MarshTech Style) -->
        <div class="bg-gray-50 p-8 rounded-lg border-2 border-gray-200 shadow-sm relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1.5 h-full bg-secondary"></div>
          
          <div class="space-y-6">
            <!-- Email -->
            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Identity / Email *</label>
              <div class="relative">
                <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 !w-5 !h-5 !text-xl">person</mat-icon>
                <input type="email" formControlName="email" placeholder="operator@marsh.tech" 
                       class="w-full pl-11 pr-4 py-3.5 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-secondary outline-none transition-all shadow-sm font-bold text-primary">
              </div>
              <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')" class="text-secondary text-[10px] mt-2 font-black tracking-widest uppercase">Required</div>
            </div>

            <!-- Password -->
            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Access Key *</label>
              <div class="relative">
                <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 !w-5 !h-5 !text-xl">vpn_key</mat-icon>
                <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••"
                       class="w-full pl-11 pr-12 py-3.5 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-secondary outline-none transition-all shadow-sm font-bold text-primary">
                <button type="button" (click)="hidePassword = !hidePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors focus:outline-none">
                  <mat-icon class="!w-5 !h-5 !text-xl">{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
              </div>
              <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')" class="text-secondary text-[10px] mt-2 font-black tracking-widest uppercase">Required</div>
            </div>
          </div>
        </div>

        <!-- Submit Button (2D Heavy) -->
        <button type="submit" [disabled]="loginForm.invalid || isLoading" 
                class="w-full py-4 rounded-md font-black uppercase tracking-[0.2em] text-white bg-secondary border-b-[4px] border-primary hover:bg-primary-hover hover:border-primary hover:shadow-[0_10px_20px_rgba(23,42,58,0.3)] active:border-b-0 active:translate-y-[4px] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm flex items-center justify-center">
          <span *ngIf="!isLoading" class="flex items-center">
            <mat-icon class="mr-2">verified</mat-icon> Authorize Session
          </span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Processing...
          </span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 border-t-2 border-gray-100 p-6 text-center">
      <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
        No credentials? 
        <a routerLink="/register" class="text-primary hover:underline ml-1">Operator sign up</a>
      </p>
    </div>
  </div>
</div>
