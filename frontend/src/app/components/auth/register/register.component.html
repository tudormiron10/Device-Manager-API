<div class="min-h-[90vh] flex items-center justify-center p-4">
  <div class="max-w-xl w-full bg-white shadow-[0_15px_50px_-15px_rgba(23,42,58,0.5)] rounded-xl overflow-hidden border-[4px] border-primary relative">
    
    <!-- Header -->
    <div class="px-4 sm:px-8 py-8 border-b-[4px] border-secondary bg-gray-50/80 text-center relative">
      <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
        <mat-icon style="width: 80px; height: 80px; font-size: 80px;">person_add</mat-icon>
      </div>
      
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-lg bg-primary text-white mb-4 shadow-lg">
        <mat-icon class="!w-10 !h-10 !text-4xl">assignment_ind</mat-icon>
      </div>
      <h2 class="text-2xl sm:text-3xl font-black uppercase tracking-[0.15em] text-primary m-0 leading-none">Operator Enrollment</h2>
      <p class="mt-3 text-[10px] font-black uppercase tracking-[0.3em] text-secondary">Access Node Registration</p>
    </div>

    <div class="p-8 lg:p-10 bg-white">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-6">
        
        <!-- Identity Section -->
        <div class="bg-gray-50 p-8 rounded-lg border-2 border-gray-200 shadow-sm relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1.5 h-full bg-secondary"></div>
          <div class="space-y-4">
            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Full Name *</label>
              <input type="text" formControlName="name" placeholder="John Doe" 
                     class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-secondary outline-none transition-all shadow-sm font-bold text-primary">
            </div>

            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Email Address *</label>
              <input type="email" formControlName="email" placeholder="name@marsh.tech" 
                     class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-secondary outline-none transition-all shadow-sm font-bold text-primary">
            </div>

            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Security Password *</label>
              <input type="password" formControlName="password" placeholder="••••••••"
                     class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-secondary outline-none transition-all shadow-sm font-bold text-primary">
            </div>
          </div>
        </div>

        <!-- Role & Location -->
        <div class="bg-gray-50 p-8 rounded-lg border-2 border-gray-200 shadow-sm relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1.5 h-full bg-primary-hover"></div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Role *</label>
              <select formControlName="role" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-primary-hover outline-none bg-white font-black text-primary tracking-widest uppercase text-xs">
                <option *ngFor="let role of roles" [value]="role">{{role}}</option>
              </select>
            </div>
            <div class="flex flex-col">
              <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block">Site Location *</label>
              <input type="text" formControlName="location" placeholder="E.g. Site A" 
                     class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:ring-0 focus:border-primary-hover outline-none transition-all shadow-sm font-bold text-primary">
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || isLoading" 
                class="w-full py-4 rounded-md font-black uppercase tracking-[0.2em] text-white bg-secondary border-b-[4px] border-primary hover:bg-primary-hover hover:border-primary shadow-lg active:border-b-0 active:translate-y-[4px] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm flex items-center justify-center">
          <span *ngIf="!isLoading" class="flex items-center">
            <mat-icon class="mr-2">how_to_reg</mat-icon> Complete Enrollment
          </span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Syncing...
          </span>
        </button>
      </form>
    </div>

    <div class="bg-gray-50 border-t-2 border-gray-100 p-6 text-center">
      <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
        Already registered? 
        <a routerLink="/login" class="text-primary hover:underline ml-1">Operator Login</a>
      </p>
    </div>
  </div>
</div>
