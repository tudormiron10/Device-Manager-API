<nav class="bg-[#0f172a] text-white shadow-2xl border-b-[6px] border-[#1e293b] py-2">
  <div class="xl:container mx-auto px-6">
    <div class="flex flex-col lg:flex-row items-center justify-between min-h-[80px] gap-6 lg:gap-0">
      
      <!-- Logo / Branding -->
      <div class="flex items-center cursor-pointer hover:opacity-80 transition-opacity" routerLink="/">
        <mat-icon class="text-[#38bdf8] mr-3" style="width: 40px; height: 40px; font-size: 40px;">terminal</mat-icon>
        <div class="flex flex-col">
          <span class="font-black text-2xl tracking-[0.2em] uppercase leading-none">MarshTech</span>
          <span class="text-[10px] font-bold tracking-[0.4em] uppercase text-[#38bdf8]">Logistics Interface</span>
        </div>
      </div>
      
      <!-- Right Side Actions -->
      <div class="flex flex-wrap items-center justify-center gap-4">
        
        <!-- Inventory Button (Industrial Green) -->
        <a routerLink="/devices" routerLinkActive="ring-2 ring-white/50 bg-[#2d4d29]" [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center px-6 py-3 bg-[#1e3a1a] border-b-4 border-[#0d1f0b] rounded-lg font-black uppercase tracking-widest text-sm hover:bg-[#254521] active:translate-y-[2px] active:border-b-0 transition-all">
          <mat-icon class="mr-2">inventory</mat-icon> Inventory
        </a>

        <!-- Logged In: Operator Menu -->
        <ng-container *ngIf="authService.currentUser$ | async as user; else guestMode">
          
          <button [matMenuTriggerFor]="userMenu"
                  class="flex items-center px-4 py-3 bg-[#1e293b] border-b-4 border-[#0f172a] rounded-lg hover:bg-[#334155] transition-all">
            <div class="flex flex-col items-end mr-3">
              <span class="text-[9px] font-black uppercase text-[#38bdf8] tracking-[0.2em]">Logged as</span>
              <span class="text-xs font-bold uppercase tracking-wider">Operator</span>
            </div>
            <mat-icon class="text-[#38bdf8]">account_circle</mat-icon>
            <mat-icon class="text-gray-500 scale-75">expand_more</mat-icon>
          </button>

          <mat-menu #userMenu="matMenu" class="industrial-menu">
            <div class="px-4 py-3 border-b border-gray-100 mb-1">
              <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Connected User</span>
              <span class="block font-bold text-sm text-gray-800">{{user.name}}</span>
              <span class="block text-[9px] font-black text-blue-600 uppercase tracking-widest mt-0.5">{{user.role}}</span>
            </div>
            
            <button mat-menu-item routerLink="/devices/new" *ngIf="authService.hasPrivilegedRole()">
              <mat-icon class="text-blue-600">add_box</mat-icon>
              <span class="font-bold text-xs uppercase tracking-widest text-gray-700">New Hardware</span>
            </button>
            
            <mat-divider></mat-divider>
            
            <button mat-menu-item (click)="logout()">
              <mat-icon class="text-red-500">power_settings_new</mat-icon>
              <span class="font-bold text-xs uppercase tracking-widest text-red-600">Exit System</span>
            </button>
          </mat-menu>

        </ng-container>

        <!-- Guest: Login / Sign Up -->
        <ng-template #guestMode>
          <a routerLink="/login" 
             class="flex items-center px-6 py-3 bg-blue-700 border-b-4 border-blue-900 rounded-lg font-black uppercase tracking-widest text-sm hover:bg-blue-600 active:translate-y-[2px] active:border-b-0 transition-all text-white">
            <mat-icon class="mr-2">login</mat-icon> Login
          </a>
          
          <a routerLink="/register" 
             class="px-6 py-3 border-2 border-white/20 rounded-lg font-black uppercase tracking-widest text-xs hover:bg-white/10 transition-all opacity-70 hover:opacity-100">
            Sign Up
          </a>
        </ng-template>
        
      </div>
    </div>
  </div>
</nav>
