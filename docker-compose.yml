
services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: devicemanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=DeviceManagerDB
    restart: unless-stopped

  # ASP.NET 9 Web API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devicemanager-api
    ports:
      - "5000:8080"
    depends_on:
      - mongodb
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=DeviceManagerDB
      - GroqSettings__BaseUrl=https://api.groq.com/openai/v1
      - GroqSettings__ApiKey=${GROQ_API_KEY}
      - GroqSettings__Model=llama-3.1-8b-instant
      - JwtSettings__SecretKey=${JWT_SECRET_KEY:-MarshTech-Test-Key-2026-ChangeInProd!}
      - JwtSettings__Issuer=MarshTechAPI
      - JwtSettings__Audience=MarshTechFrontend
      - JwtSettings__ExpirationHours=24
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devicemanager-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
