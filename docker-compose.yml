
services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: devicemanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=DeviceManagerDB
    restart: unless-stopped

  # ASP.NET 9 Web API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devicemanager-api
    ports:
      - "5000:8080"
    depends_on:
      - mongodb
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=DeviceManagerDB
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devicemanager-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
